<div class="bg-surface shadow rounded-lg overflow-hidden cursor-pointer border border-transparent hover:border-border transition-all" (click)="navigateToPost()">
  <!-- Post Cover Image -->
  @if (post().coverImage; as coverImage) {
    <img [ngSrc]="coverImage" width="1000" height="420" alt="Cover" class="w-full h-auto object-cover" [priority]="isPriority()">
  }

  <!-- Post Content -->
  <div class="p-6">
    <!-- Author Info -->
    <div class="flex items-center mb-4">
      <img [ngSrc]="post().author.avatar" width="40" height="40" alt="Author" class="w-10 h-10 rounded-full mr-3 cursor-pointer" (click)="navigateToAuthor($event)">
      <div class="cursor-pointer" (click)="navigateToAuthor($event)">
        <p class="font-semibold text-main">{{ post().author.name }}</p>
        <p class="text-xs text-muted">{{ post().publishedDate | date:'MMM d' }} • {{ post().readingTime }} min read</p>
      </div>
    </div>

    <!-- Post Title -->
    <div class="mb-3">
      <h2 class="text-xl font-bold text-main hover:text-primary transition-colors">{{ post().title }}</h2>
    </div>

    <!-- Post Tags -->
    <div class="mb-3 flex flex-wrap">
      @for (tag of post().tags; track tag) {
        <span class="mr-2 mb-2 text-xs text-muted hover:text-primary cursor-pointer" (click)="$event.stopPropagation()">#{{ tag }}</span>
      }
    </div>

    <!-- Post Excerpt -->
    <p class="text-secondary mb-4">{{ post().excerpt }}</p>

    <!-- Post Actions -->
    <div class="flex items-center justify-between pt-2 border-t border-border">
      <div class="flex items-center space-x-4">
        <button
          class="flex items-center space-x-1 transition-colors"
          [class.text-red-500]="isLiked()"
          [class.text-muted]="!isLiked()"
          [class.hover:text-red-500]="!isLiked()"
          (click)="likePost($event)">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" [class.fill-current]="isLiked()" [class.fill-none]="!isLiked()" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
          <span class="text-sm font-medium">{{ likesCount() }}</span>
        </button>
        <button
          class="flex items-center space-x-1 text-muted hover:text-primary transition-colors"
          (click)="$event.stopPropagation()">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
          <span class="text-sm font-medium">{{ post().comments }}</span>
        </button>
      </div>

      <button
        class="flex items-center space-x-1 transition-colors"
        [class.text-primary]="isBookmarked()"
        [class.text-muted]="!isBookmarked()"
        [class.hover:text-primary]="!isBookmarked()"
        (click)="bookmarkPost($event)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" [class.fill-current]="isBookmarked()" [class.fill-none]="!isBookmarked()" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
        </svg>
        <span class="text-sm font-medium">{{ isBookmarked() ? 'Saved' : 'Save' }}</span>
      </button>
    </div>
  </div>
</div>
