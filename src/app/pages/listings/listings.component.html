<div class="container mx-auto px-4 py-8 max-w-5xl transition-colors duration-200">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-main mb-2">Listings</h1>
    <p class="text-muted">Find jobs, mentorship, and opportunities in the dev community.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div *ngFor="let item of listings" class="bg-surface p-6 rounded-lg shadow-sm border border-border">
      <span class="inline-block px-2 py-1 bg-yellow-100/10 text-yellow-600 dark:text-yellow-400 text-xs font-bold rounded mb-3 border border-yellow-500/30">{{ item.type }}</span>
      <h3 class="text-xl font-bold text-main mb-2">{{ item.title }}</h3>
      <p class="text-muted text-sm mb-4">{{ item.description }}</p>
      <div class="flex justify-between items-center">
        <span class="text-xs text-muted">{{ item.org }}</span>
        <button (click)="handleAction(item)" class="text-primary hover:underline text-sm font-semibold">{{ item.action }}</button>
      </div>
    </div>
  </div>
</div>
