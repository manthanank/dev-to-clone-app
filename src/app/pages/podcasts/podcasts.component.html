<div class="container mx-auto px-4 py-8 max-w-5xl transition-colors duration-200">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-main mb-2">Podcasts</h1>
    <p class="text-muted">Listen to the best developer stories and technical deep dives.</p>
  </div>

  <div class="space-y-6">
    @for (podcast of podcasts; track podcast) {
      <div class="flex flex-col md:flex-row bg-surface rounded-lg shadow-sm border border-border overflow-hidden">
        <div class="md:w-48 h-48 flex items-center justify-center" [ngClass]="podcast.theme === 'blue' ? 'bg-blue-600/20' : 'bg-primary/20'">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
          </svg>
        </div>
        <div class="p-6 flex-grow">
          <h3 class="text-xl font-bold text-main mb-1">{{ podcast.title }}</h3>
          <p class="text-muted mb-4 text-sm font-medium">{{ podcast.meta }}</p>
          <p class="text-muted mb-6">{{ podcast.description }}</p>
          <button (click)="listenPodcast()" class="px-6 py-2 text-white font-bold rounded" [ngClass]="podcast.theme === 'blue' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-primary hover:opacity-90 transition-opacity'">Listen Now</button>
        </div>
      </div>
    }
  </div>
</div>
