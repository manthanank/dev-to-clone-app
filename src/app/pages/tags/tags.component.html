<div class="container mx-auto px-4 py-8 max-w-6xl transition-colors duration-200">
  <div class="mb-8">
    <h1 class="text-4xl font-bold mb-4 text-main">Top Tags</h1>
    <p class="text-muted text-lg max-w-2xl">
      Tags help you discover specific content and discussions that interest you. 
      Follow tags to personalize your feed.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div *ngFor="let tag of tags" 
      class="bg-surface rounded-lg shadow-sm border border-border p-6 hover:shadow-md transition-all cursor-pointer flex flex-col group"
      (click)="navigateToTag(tag.name)">
      <div class="flex items-center mb-4">
        <span class="px-3 py-1 bg-background border border-border rounded-md text-main font-bold group-hover:text-primary transition-colors">#{{ tag.name }}</span>
      </div>
      <p class="text-muted text-sm mb-6 flex-grow">
        {{ tag.description }}
      </p>
      <div class="flex items-center justify-between mt-auto">
        <span class="text-xs text-muted font-medium">{{ tag.count | number }} posts published</span>
        <button (click)="toggleFollowTag(tag.name, $event)" class="px-4 py-2 bg-background border border-border text-main text-sm font-semibold rounded hover:bg-primary hover:text-white transition-all">{{ followedTags.has(tag.name) ? 'Following' : 'Follow' }}</button>
      </div>
    </div>
  </div>
</div>
