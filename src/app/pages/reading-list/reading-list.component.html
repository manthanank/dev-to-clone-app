<div class="container mx-auto px-4 py-8 max-w-4xl transition-colors duration-200">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold text-main">Reading List ({{ bookmarkedPosts.length }})</h1>
    <a routerLink="/" class="text-primary hover:underline">Back to feed</a>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500"></div>
  </div>

  <div *ngIf="!loading && bookmarkedPosts.length === 0" class="bg-surface rounded-lg shadow-xl p-12 text-center border border-border">
    <div class="mb-6 flex justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-muted/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
      </svg>
    </div>
    <h2 class="text-2xl font-bold mb-2 text-main">Your reading list is empty</h2>
    <p class="text-muted mb-8">Save articles to read them later or keep them for reference.</p>
    <a routerLink="/" class="px-6 py-3 bg-primary text-white font-semibold rounded-md hover:opacity-90 transition-all shadow-lg active:scale-95 inline-block">Start reading</a>
  </div>

  <div *ngIf="!loading && bookmarkedPosts.length > 0" class="space-y-6">
    <app-post-card *ngFor="let post of bookmarkedPosts" [post]="post"></app-post-card>
  </div>
</div>
