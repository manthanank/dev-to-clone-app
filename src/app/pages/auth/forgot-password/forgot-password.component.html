<div class="min-h-[calc(100vh-64px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-background relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>

  <div class="max-w-md w-full space-y-8 relative z-10">
    <div class="text-center">
      <div class="inline-block transform hover:scale-110 transition-transform duration-300">
        <span class="bg-main text-header text-4xl font-black px-4 py-2 rounded-lg shadow-2xl">DEV</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-main">Forgot Password?</h2>
      <p class="mt-2 text-sm text-muted"> No worries, we'll send you reset instructions. </p>
    </div>

    <div class="bg-surface backdrop-blur-md rounded-2xl shadow-2xl border border-border p-8">
      @if (isSent) {
        <div class="text-center space-y-6 py-4 animate-fade-in">
          <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400">
            <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <div>
            <h3 class="text-xl font-bold text-main">Check your email</h3>
            <p class="mt-2 text-sm text-muted">We've sent a password reset link to <span class="font-bold text-main">{{ email }}</span></p>
          </div>
          <button
            (click)="isSent = false"
            class="text-sm font-bold text-primary hover:underline">
            Didn't receive the email? Click to resubmit
          </button>
          <a routerLink="/login" class="block w-full py-3 px-4 bg-primary text-white font-bold rounded-xl text-center">Back to login</a>
        </div>
      }

      @if (!isSent) {
        <form class="space-y-6" (ngSubmit)="onSubmit()">
          @if (errorMessage) {
            <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-lg text-sm font-medium border border-red-200 dark:border-red-800">
              {{ errorMessage }}
            </div>
          }
          <div>
            <label for="email-address" class="block text-sm font-bold text-main mb-1">Email address</label>
            <input
              id="email-address"
              name="email"
              type="email"
              [(ngModel)]="email"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="you@example.com">
          </div>
          <div>
            <button
              type="submit"
              [disabled]="isLoading"
              class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-95 disabled:opacity-70">
              @if (isLoading) {
                <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                  <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                </span>
              }
              {{ isLoading ? 'Sending instructions...' : 'Reset password' }}
            </button>
          </div>
          <div class="text-center">
            <a routerLink="/login" class="text-sm font-bold text-muted hover:text-main flex items-center justify-center transition-colors">
              <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
              </svg>
              Back to login
            </a>
          </div>
        </form>
      }
    </div>
  </div>
</div>
