<div class="min-h-[calc(100dvh-64px)] box-border flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-background relative transition-colors duration-200">
  <!-- Interactive background elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -right-32 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute -bottom-32 -left-32 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] animate-pulse" style="animation-delay: 1.5s"></div>
  </div>

  <div class="max-w-md w-full space-y-10 relative z-10">
    <div class="text-center animate-fade-in">
      <div class="inline-block transform hover:scale-110 transition-all duration-500 cursor-default">
          <div class="relative">
              <span class="bg-main text-header text-5xl font-black px-6 py-3 rounded-2xl shadow-2xl relative z-10">DEV</span>
              <div class="absolute -inset-1 bg-primary blur opacity-25 group-hover:opacity-50 transition-opacity"></div>
          </div>
      </div>
      <h2 class="mt-10 text-4xl font-black text-main tracking-tight">Join the Community</h2>
      <p class="mt-4 text-muted text-lg font-medium">Connect with 1M+ incredible developers.</p>
    </div>

    <div class="bg-surface/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-border p-10 transform transition-all hover:shadow-primary/5 animate-scale-in">
      <form class="space-y-8" (ngSubmit)="onSubmit()">
        @if (errorMessage()) {
          <div class="bg-red-500/10 text-red-500 p-4 rounded-2xl text-xs font-bold border border-red-500/20 animate-shake">
            ⚠️ {{ errorMessage() }}
          </div>
        }

        <div class="space-y-6">
          <div class="group">
            <label for="full-name" class="block text-[10px] font-black text-muted uppercase tracking-widest mb-2 px-1">Full Name</label>
            <input
              id="full-name"
              name="name"
              type="text"
              [ngModel]="name()"
              (ngModelChange)="name.set($event)"
              required
              class="appearance-none block w-full px-4 py-4 border border-border rounded-2xl bg-background text-main placeholder-muted/30 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
              placeholder="Jane Doe">
          </div>
          <div class="group">
            <label for="email-address" class="block text-[10px] font-black text-muted uppercase tracking-widest mb-2 px-1">Email Address</label>
            <input
              id="email-address"
              name="email"
              type="email"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              required
              class="appearance-none block w-full px-4 py-4 border border-border rounded-2xl bg-background text-main placeholder-muted/30 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
              placeholder="you@awesome.com">
          </div>
          <div class="group">
            <label for="password" class="block text-[10px] font-black text-muted uppercase tracking-widest mb-2 px-1">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              required
              class="appearance-none block w-full px-4 py-4 border border-border rounded-2xl bg-background text-main placeholder-muted/30 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
              placeholder="Min. 8 characters">
          </div>
        </div>

        <div class="flex items-start px-1">
          <div class="flex items-center h-5">
            <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-primary focus:ring-primary border-border rounded bg-background">
          </div>
          <div class="ml-3 text-[10px] leading-tight">
            <label for="terms" class="font-bold text-muted uppercase tracking-wider">
              I agree to the <a routerLink="/about" class="text-primary hover:underline">Terms of Service</a> and <a routerLink="/about" class="text-primary hover:underline">Privacy Policy</a>
            </label>
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="isLoading()"
            class="relative w-full flex justify-center py-4 px-6 border border-transparent text-sm font-black rounded-2xl text-white bg-primary hover:bg-primary-hover shadow-xl shadow-primary/20 transition-all transform active:scale-95 disabled:opacity-70 uppercase tracking-widest"
          >
            @if (isLoading()) {
              <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating...
            } @else {
              Create Account
            }
          </button>
        </div>
      </form>

      <div class="mt-10 pt-10 border-t border-border flex flex-col items-center">
        <span class="text-[10px] text-muted uppercase tracking-[0.2em] font-black mb-6">Or join with</span>
        <div class="flex gap-6">
          <button type="button" (click)="onSocialLogin('github')" class="p-4 border border-border rounded-2xl bg-surface hover:bg-background transition-all hover:border-primary/50 group active:scale-95">
            <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 0C4.477 0 0 4.477 0 10c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0110 4.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C17.137 18.163 20 14.418 20 10c0-5.523-4.477-10-10-10z" clip-rule="evenodd" /></svg>
          </button>
          <button type="button" (click)="onSocialLogin('twitter')" class="p-4 border border-border rounded-2xl bg-surface hover:bg-background transition-all hover:border-primary/50 group active:scale-95">
            <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path d="M6.29 18.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0020 3.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 01.8 7.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 010 16.407a11.616 11.616 0 006.29 1.844" /></svg>
          </button>
        </div>
        <!-- Social Login Notice -->
        @if (socialLoginMessage()) {
          <div class="mt-8 bg-primary/5 text-primary p-4 rounded-2xl text-[10px] font-black border border-primary/10 text-center animate-fade-in uppercase tracking-wider">
            ⚠️ {{ socialLoginMessage() }}
          </div>
        }
      </div>
    </div>

    <p class="mt-8 text-center text-sm font-medium text-muted">
      Already a member?
      <a routerLink="/login" class="font-black text-primary hover:underline ml-1">Sign in here</a>
    </p>
  </div>
</div>
