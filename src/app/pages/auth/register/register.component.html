<div class="min-h-[calc(100dvh-64px)] box-border flex items-center justify-center py-6 md:py-10 px-4 sm:px-6 lg:px-8 bg-background relative">
  <!-- Decorative background elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s"></div>
  </div>

  <div class="max-w-md w-full space-y-8 relative z-10">
    <div class="text-center">
      <div class="inline-block transform hover:scale-110 transition-transform duration-300">
        <span class="bg-main text-header text-4xl font-black px-4 py-2 rounded-lg shadow-2xl">DEV</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-main">Create your account</h2>
      <p class="mt-2 text-sm text-muted"> Join the global community of builders </p>
    </div>

    <div class="bg-surface backdrop-blur-md rounded-2xl shadow-2xl border border-border p-8 transform transition-all hover:shadow-purple-500/10">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        @if (errorMessage) {
          <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-lg text-sm font-medium border border-red-200 dark:border-red-800">
            {{ errorMessage }}
          </div>
        }

        <div class="space-y-4">
          <div>
            <label for="full-name" class="block text-sm font-bold text-main mb-1">Full Name</label>
            <input
              id="full-name"
              name="name"
              type="text"
              [(ngModel)]="name"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="Jane Doe">
          </div>
          <div>
            <label for="email-address" class="block text-sm font-bold text-main mb-1">Email address</label>
            <input
              id="email-address"
              name="email"
              type="email"
              [(ngModel)]="email"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="you@example.com">
          </div>
          <div>
            <label for="password" class="block text-sm font-bold text-main mb-1">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="Min. 8 characters">
          </div>
        </div>

        <div class="flex items-center">
          <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-primary focus:ring-primary border-border rounded bg-background">
          <label for="terms" class="ml-2 block text-xs text-muted">
            By signing up, I agree to the <a routerLink="/about" class="text-primary hover:underline">Terms of Service</a> and <a routerLink="/about" class="text-primary hover:underline">Privacy Policy</a>
          </label>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="isLoading"
            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-95 disabled:opacity-70">
            @if (isLoading) {
              <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
            }
            {{ isLoading ? 'Creating account...' : 'Create account' }}
          </button>
        </div>
      </form>

      <div class="mt-8 text-center">
        <span class="text-xs text-muted uppercase tracking-wider font-bold">Or sign up with</span>
        <div class="mt-4 flex justify-center space-x-4">
          <button type="button" (click)="onSocialLogin('github')" class="p-3 border border-border rounded-xl bg-surface hover:bg-background transition-all transform hover:-translate-y-1">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 0C4.477 0 0 4.477 0 10c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0110 4.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C17.137 18.163 20 14.418 20 10c0-5.523-4.477-10-10-10z" clip-rule="evenodd" /></svg>
          </button>
          <button type="button" (click)="onSocialLogin('twitter')" class="p-3 border border-border rounded-xl bg-surface hover:bg-background transition-all transform hover:-translate-y-1">
            <svg class="w-6 h-6 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path d="M6.29 18.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0020 3.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.072 4.072 0 01.8 7.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 010 16.407a11.616 11.616 0 006.29 1.844" /></svg>
          </button>
        </div>
        <!-- Social Login Notice -->
        @if (socialLoginMessage) {
          <div class="mt-3 bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 p-3 rounded-lg text-sm font-medium border border-amber-200 dark:border-amber-700">
            ⚠️ {{ socialLoginMessage }}
          </div>
        }
      </div>
    </div>

    <p class="mt-8 text-center text-sm text-muted">
      Already have an account?
      <a routerLink="/login" class="font-bold text-primary hover:underline ml-1">Sign in</a>
    </p>
  </div>
</div>
