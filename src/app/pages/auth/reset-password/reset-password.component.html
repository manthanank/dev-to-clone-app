<div class="min-h-[calc(100vh-64px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-background relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -right-24 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s"></div>

  <div class="max-w-md w-full space-y-8 relative z-10">
    <div class="text-center">
      <div class="inline-block transform hover:scale-110 transition-transform duration-300">
        <span class="bg-main text-header text-4xl font-black px-4 py-2 rounded-lg shadow-2xl">DEV</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-main">Set new password</h2>
      <p class="mt-2 text-sm text-muted"> Your new password must be different from previously used passwords. </p>
    </div>

    <div class="bg-surface backdrop-blur-md rounded-2xl shadow-2xl border border-border p-8">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        @if (errorMessage) {
          <div class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded-lg text-sm font-medium border border-red-200 dark:border-red-800">
            {{ errorMessage }}
          </div>
        }

        <div class="space-y-4">
          <div>
            <label for="password" class="block text-sm font-bold text-main mb-1">New Password</label>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="••••••••">
          </div>
          <div>
            <label for="confirm-password" class="block text-sm font-bold text-main mb-1">Confirm New Password</label>
            <input
              id="confirm-password"
              name="confirmPassword"
              type="password"
              [(ngModel)]="confirmPassword"
              required
              class="appearance-none block w-full px-3 py-3 border border-border rounded-xl shadow-sm placeholder-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent sm:text-sm bg-background text-main transition-all"
              placeholder="••••••••">
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="isLoading"
            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-95 disabled:opacity-70">
            @if (isLoading) {
              <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
            }
            {{ isLoading ? 'Updating password...' : 'Reset password' }}
          </button>
        </div>

        <div class="text-center">
          <a routerLink="/login" class="text-sm font-bold text-muted hover:text-main flex items-center justify-center transition-colors">
            <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
