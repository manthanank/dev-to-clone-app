<div class="container mx-auto px-4 py-12 max-w-5xl transition-colors duration-200">
  <div class="flex flex-col md:flex-row gap-12">
    <!-- Settings Sidebar -->
    <div class="w-full md:w-1/4">
      <div class="sticky top-24 space-y-2">
        <h2 class="text-xs font-black text-muted uppercase tracking-[0.2em] mb-6 px-4">Account Settings</h2>
        
        <button type="button" class="w-full text-left bg-primary/10 p-4 rounded-2xl font-black text-primary flex items-center gap-3 transition-all">
          <span class="text-xl">👤</span> Profile
        </button>
        <button type="button" class="w-full text-left hover:bg-surface p-4 rounded-2xl text-muted hover:text-main font-bold flex items-center gap-3 transition-all group">
          <span class="text-xl group-hover:rotate-12 transition-transform">⚙️</span> Experience
        </button>
        <button type="button" class="w-full text-left hover:bg-surface p-4 rounded-2xl text-muted hover:text-main font-bold flex items-center gap-3 transition-all group">
          <span class="text-xl group-hover:rotate-12 transition-transform">🔔</span> Notifications
        </button>
        <button type="button" class="w-full text-left hover:bg-surface p-4 rounded-2xl text-muted hover:text-main font-bold flex items-center gap-3 transition-all group border-b border-border pb-6 mb-6">
          <span class="text-xl group-hover:rotate-12 transition-transform">📱</span> Security
        </button>

        <button (click)="authService.logout()" class="w-full text-left p-4 rounded-2xl text-red-500 hover:bg-red-500/10 transition-all font-black flex items-center gap-3 group">
          <span class="text-xl group-hover:-translate-x-1 transition-transform">🚪</span> Sign Out
        </button>
      </div>
    </div>

    <!-- Settings Content -->
    <div class="w-full md:w-3/4 animate-fade-in">
      <div class="bg-surface rounded-[2rem] shadow-xl border border-border overflow-hidden">
        <div class="p-8 md:p-12 border-b border-border bg-gradient-to-r from-primary/5 to-transparent">
          <h1 class="text-4xl font-black text-main">User Profile</h1>
          <p class="text-muted mt-2 font-medium">Update your public presence and API configurations.</p>
        </div>

        <form (ngSubmit)="saveProfile()" class="p-8 md:p-12 space-y-10">
          @if (saveMessage()) {
            <div class="bg-green-500/10 text-green-500 p-5 rounded-2xl border border-green-500/20 text-sm font-bold flex items-center gap-3 animate-fade-in">
              <span class="text-xl">✅</span> {{ saveMessage() }}
            </div>
          }

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="group">
              <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">Display Name</label>
              <input type="text" name="name" [ngModel]="name()" (ngModelChange)="name.set($event)" class="w-full px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all">
            </div>

            <div class="group">
              <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">Email Address</label>
              <input type="email" name="email" [ngModel]="email()" (ngModelChange)="email.set($event)" class="w-full px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all">
            </div>
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">Username</label>
            <div class="relative">
              <span class="absolute left-6 top-1/2 -translate-y-1/2 text-muted font-bold">&#64;</span>
              <input type="text" name="username" [ngModel]="username()" (ngModelChange)="username.set($event)" class="w-full pl-12 pr-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all">
            </div>
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">Avatar Image URL</label>
            <div class="flex gap-4">
                <input type="text" name="avatar" [ngModel]="avatar()" (ngModelChange)="avatar.set($event)" class="flex-1 px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all font-mono text-xs">
                @if (avatar()) {
                    <div class="w-14 h-14 rounded-2xl border border-border overflow-hidden bg-background">
                        <img [src]="avatar()" alt="Preview" class="w-full h-full object-cover">
                    </div>
                }
            </div>
          </div>

          <div class="group">
            <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">Professional Bio</label>
            <textarea rows="4" name="bio" [ngModel]="bio()" (ngModelChange)="bio.set($event)" class="w-full px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all leading-relaxed"></textarea>
          </div>

          <div class="pt-10 border-t border-border space-y-8">
            <h3 class="text-xl font-black text-main">API Configuration</h3>
            
            <div class="group">
              <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">API Base URL</label>
              <input type="text" name="apiUrl" [ngModel]="apiUrl()" (ngModelChange)="apiUrl.set($event)" class="w-full px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all font-mono text-sm">
              <p class="text-[10px] text-muted font-bold mt-3 uppercase tracking-wide">Base API endpoint for all data requests.</p>
            </div>

            <div class="group">
              <label class="block text-[10px] font-black text-muted uppercase tracking-widest mb-3 px-1">DEV.TO API Key <span class="text-primary/50 text-[8px] ml-2">(Optional / Restricted)</span></label>
              <input type="password" name="apiKey" [ngModel]="apiKey()" (ngModelChange)="apiKey.set($event)" autocomplete="off" class="w-full px-6 py-4 border border-border rounded-2xl focus:ring-2 focus:ring-primary bg-background text-main outline-none transition-all font-mono">
              <p class="text-[10px] text-muted font-bold mt-3 uppercase tracking-wide leading-relaxed">Required for authenticated actions. Stored securely in your browser's LocalStorage.</p>
            </div>
          </div>

          <div class="pt-10 flex justify-end">
            <button type="submit" class="px-12 py-4 bg-primary text-white font-black rounded-2xl hover:bg-primary-hover shadow-xl shadow-primary/30 transition-all transform active:scale-95 uppercase tracking-widest text-sm">
              Update Profile
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
