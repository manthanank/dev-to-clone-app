<div class="container mx-auto px-4 py-8 max-w-4xl transition-colors duration-200">
  <div class="mb-10">
    <h1 class="text-3xl font-bold text-main">Settings for <span class="text-primary">&#64;{{ (currentUser$ | async)?.username }}</span></h1>
  </div>

  <div class="flex flex-col md:flex-row gap-8">
    <!-- Settings Sidebar -->
    <div class="w-full md:w-1/4 space-y-2">
      <button type="button" class="w-full text-left bg-surface p-3 rounded-md font-bold text-primary border-l-4 border-primary shadow-sm">👤 User Profile</button>
      <button type="button" class="w-full text-left hover:bg-surface p-3 rounded-md text-muted hover:text-main transition-colors">⚙️ Experience</button>
      <button type="button" class="w-full text-left hover:bg-surface p-3 rounded-md text-muted hover:text-main transition-colors">🔔 Notifications</button>
      <button type="button" class="w-full text-left hover:bg-surface p-3 rounded-md text-muted hover:text-main transition-colors border-b border-border pb-4">📱 Devices</button>

      <button (click)="authService.logout()" class="w-full text-left p-3 rounded-md text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all font-semibold mt-4">🚪 Sign out</button>
    </div>

    <!-- Settings Content -->
    <div class="w-full md:w-3/4 space-y-8">
      <div class="bg-surface rounded-lg shadow-sm border border-border p-8">
        <h2 class="text-2xl font-bold mb-6 text-main">User Profile</h2>

        <form (ngSubmit)="saveProfile()" class="space-y-6">
          <div *ngIf="saveMessage" class="bg-green-50 text-green-700 p-3 rounded-md border border-green-200 text-sm font-medium">
            {{ saveMessage }}
          </div>
          <div>
            <label class="block text-sm font-bold text-main mb-2">Name</label>
            <input type="text" name="name" [(ngModel)]="name" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">Email</label>
            <input type="email" name="email" [(ngModel)]="email" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">Username</label>
            <div class="flex">
              <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-border bg-background text-muted">&#64;</span>
              <input type="text" name="username" [(ngModel)]="username" class="flex-1 p-3 border border-border rounded-r-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">Profile Image URL</label>
            <input type="text" name="avatar" [(ngModel)]="avatar" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">Bio</label>
            <textarea rows="4" name="bio" [(ngModel)]="bio" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">API Base URL</label>
            <input type="text" name="apiUrl" [(ngModel)]="apiUrl" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
            <p class="text-xs text-muted mt-2">Base API endpoint used by the app.</p>
          </div>

          <div>
            <label class="block text-sm font-bold text-main mb-2">DEV API Key (Optional)</label>
            <input type="password" name="apiKey" [(ngModel)]="apiKey" autocomplete="off" class="w-full p-3 border border-border rounded-md focus:ring-2 focus:ring-primary bg-background text-main outline-none">
            <p class="text-xs text-muted mt-2">Used for authenticated API requests. The key is stored in browser storage, not in source code.</p>
          </div>

          <div class="pt-4">
            <button type="submit" class="px-6 py-3 bg-primary text-white font-bold rounded-md hover:opacity-90 transition-all flex items-center">
              Save Profile Information
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
